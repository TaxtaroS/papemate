name: project_v14

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - papermate_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      ENABLE_API_DOCS: "false"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - papermate_hf_cache:/root/.cache/huggingface
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  papermate_mongo:
  papermate_hf_cache:
