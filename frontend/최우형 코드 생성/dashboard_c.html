<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/dashboard-page.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

<div class="container">

  <!-- 사이드바 -->
  <aside class="sidebar">

    <div>

      <div class="logo-wrap">

        <div class="logo-icon">
          <i class="fa-solid fa-robot"></i>
        </div>

        <div class="logo-text">
          <span>ChatBot AI</span>
          <h2>Paper Mate</h2>
        </div>

      </div>

      <div class="menu-group">

        <a href="./index.html" class="menu-link">
          <div class="menu-item">
            <i class="fa-regular fa-message"></i>
            <span>새 채팅</span>
          </div>
        </a>

        <div class="menu-sub">최근 대화</div>

        <div class="menu-item">
          <i class="fa-regular fa-message"></i>
          <span>Rag란 무엇인가</span>
        </div>

        <div class="menu-item">
          <i class="fa-regular fa-message"></i>
          <span>비교분석</span>
        </div>

        <div class="menu-item">
          <i class="fa-regular fa-message"></i>
          <span>LLM이란 무엇인가</span>
        </div>

      </div>

      <hr>

      <div class="menu-bottom">

        <div class="menu-item">
          <i class="fa-solid fa-share-nodes"></i>
          <span>공유</span>
        </div>

        <div class="menu-item">
          <i class="fa-regular fa-clock"></i>
          <span>히스토리</span>
        </div>

        <div class="menu-item">
          <i class="fa-solid fa-chart-simple"></i>
          <span>분석 비교</span>
        </div>

        <div class="menu-item active-menu">
          <i class="fa-regular fa-folder"></i>
          <span>내 프로젝트</span>
        </div>

      </div>

    </div>

    <div class="user-box">
      <i class="fa-regular fa-circle-user"></i>
      <span id="sidebarUsername">user14530</span>
      <i class="fa-solid fa-gear"></i>
    </div>

  </aside>

  <!-- 메인 -->
  <main class="dashboard-main">

    <div class="dashboard-header">

      <h1>내 프로젝트</h1>

      <button class="new-project-btn">
        + 새 프로젝트...
      </button>

    </div>

    <!-- 초대 -->
    <div class="invite-box">

      <div class="invite-left">
        🔑 초대 코드로 팀 프로젝트 참여 :
        <span class="invite-code">aa33ddf</span>
      </div>

      <button class="join-btn">
        참여하기
      </button>

    </div>

    <!-- 카드 -->
    <div class="dashboard-grid">

      <!-- 카드 -->
      <div class="dashboard-card">

        <div class="card-top">

          <span class="tag pdf-tag">
            PDF x 3
          </span>

        </div>

        <h2>이미지 분류</h2>

        <p>최근 수정 2026.05.04</p>

        <div class="card-bottom">

          <div class="card-info">
            👥 개인
          </div>

          <i class="fa-solid fa-pen"></i>

        </div>

      </div>

      <!-- 카드 -->
      <div class="dashboard-card">

        <div class="card-top">

          <span class="tag hwp-tag">
            hwp
          </span>

        </div>

        <h2>자연어 처리</h2>

        <p>최근 수정 2026.05.04</p>

        <div class="card-bottom">

          <div class="card-info">
            👤 개인
          </div>

          <i class="fa-solid fa-pen"></i>

        </div>

      </div>

      <!-- 카드 -->
      <div class="dashboard-card">

        <div class="card-top">

          <span class="tag pdf-tag">
            PDF
          </span>

        </div>

        <h2>논문 분석 처리</h2>

        <p>최근 수정 2026.05.04</p>

        <div class="card-bottom">

          <div class="card-info">
            👤 개인
          </div>

          <i class="fa-solid fa-pen"></i>

        </div>

      </div>

      <!-- 빈 카드 -->
      <div class="empty-card">
        +<br>
        새 프로젝트 추가
      </div>

      <div class="empty-card">
        +<br>
        새 프로젝트 추가
      </div>

      <div class="empty-card">
        +<br>
        새 프로젝트 추가
      </div>

    </div>

  </main>

</div>

<script src="./js/share.js"></script>
<script>
  // 로그인 체크 - 모든 보호 페이지에 추가
const isLoggedIn = localStorage.getItem('isLoggedIn');
if (!isLoggedIn) {
  window.location.href = './login.html';
}

// 사이드바 유저명 표시
const username = localStorage.getItem('username') || 'user14530';
document.getElementById('sidebarUsername').textContent = username;
</script>
</body>
</html>
